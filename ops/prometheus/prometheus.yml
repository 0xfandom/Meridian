global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alert-rules.yml

scrape_configs:
  - job_name: meridian-alerts
    metrics_path: /metrics
    static_configs:
      # The alerts service runs on the host; Prometheus reaches it via the gateway.
      - targets:
          - host.docker.internal:3002
