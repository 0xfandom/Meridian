# Local monitoring stack. Run the alerts service on the host
# (`pnpm --filter @meridian/alerts start`), then `docker compose -f ops/docker-compose.yml up`.
# Prometheus scrapes the host-run alerts service and evaluates the alert rules.
services:
  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus:/etc/prometheus:ro
    ports:
      - "9090:9090"
    extra_hosts:
      - host.docker.internal:host-gateway
