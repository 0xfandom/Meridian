packages:
  - "backend/*"
  - "apps/*"
  - "packages/*"

allowBuilds:
  # Optional native acceleration pulled in transitively by wagmi/walletconnect. All have pure-JS
  # fallbacks (viem hashes via @noble/hashes; bufferutil/utf-8-validate only speed up `ws`), so we
  # explicitly skip the native build to keep installs deterministic and CI free of compilers.
  bufferutil: false
  esbuild: true
  keccak: false
  sharp: true
  utf-8-validate: false
